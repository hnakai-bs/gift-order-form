<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規会員登録 | ご進物お申込み</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/profile.css">
</head>
<body class="has-fixed-app-header">

    <header class="app-fixed-header">
        <div class="app-fixed-header__inner">
            <a href="../order/index.html" class="app-fixed-header__logo">
                <img src="../assets/img/logo.png" width="200" height="40" alt="ご進物お申込み">
            </a>
            <nav class="app-fixed-header__nav" aria-label="ユーティリティ">
                <a href="../mypage/index.html" class="app-fixed-header__mypage">
                    <span class="material-icons-outlined" aria-hidden="true">account_circle</span>
                    <span>マイページ</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="container">
        <header class="app-page-header">
            <h1 class="app-page-heading">新規会員登録</h1>
        </header>

        <section class="form-card">
            <div class="card-content">
                <form action="order_list.html" method="POST" onsubmit="event.preventDefault(); window.location.href='../order/index.html';">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="user_name">氏名 <span class="required-dot"></span></label>
                            <input type="text" id="user_name" name="user_name" placeholder="山田 太郎" required autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label for="user_kana">氏名（フリガナ） <span class="required-dot"></span></label>
                            <input type="text" id="user_kana" name="user_kana" placeholder="ヤマダ タロウ" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">メールアドレス <span class="required-dot"></span></label>
                        <input type="email" id="email" name="email" placeholder="example@example.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="tel">電話番号 <span class="required-dot"></span></label>
                        <input type="tel" id="tel" name="tel" placeholder="09012345678" required autocomplete="tel">
                        <p class="form-hint">ログイン時にご利用いただきます。</p>
                    </div>

                    <div class="form-row">
                        <div class="form-group" style="flex: 0 0 30%;">
                            <label for="zip">郵便番号 <span class="required-dot"></span></label>
                            <input type="text" id="zip" name="zip" placeholder="1000001" required inputmode="numeric" autocomplete="postal-code">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="address">住所 <span class="required-dot"></span></label>
                            <input type="text" id="address" name="address" placeholder="東京都千代田区千代田1-1" required autocomplete="street-address">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">ログインパスワード <span class="required-dot"></span></label>
                        <input type="password" id="password" name="password" placeholder="8文字以上の半角英数字" required autocomplete="new-password" minlength="8">
                    </div>

                    <div class="agreement-area">
                        <label class="checkbox-container">
                            <input type="checkbox" name="agree" required>
                            <span class="checkmark"></span>
                            <a href="#" target="_blank" class="link-text">利用規約</a>に同意する
                        </label>
                    </div>

                    <div class="action-area center">
                        <button type="submit" class="btn btn-primary btn-wide">登録する</button>
                        <!-- <div style="margin-top: 30px;">
                            <a href="index.html" class="link-text">ログイン画面へ戻る</a>
                        </div> -->
                    </div>

                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p class="copyright">&copy; ご進物お申込み All Rights Reserved.</p>
    </footer>

</body>
</html>
