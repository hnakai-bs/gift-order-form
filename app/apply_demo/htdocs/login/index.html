                    <h2 class="card-title">初めてご利用の方</h2>
                    <p class="card-description">
                        お手元のカタログからお申し込みいただくには、まず会員登録（送り主情報の登録）をお願いいたします。
                    </p>
                    <div class="action-area">
                        <a href="/app/apply_demo/htdocs/profile/index.html" class="btn btn-primary">新規会員登録へ</a>
                    </div>
                </div>
            </section>

            <section class="login-card login-card--split">
                <div class="card-content">
                    <h2 class="card-title">会員様・過去にご注文いただいた方</h2>

                    <div class="login-block">

                            過去にご注文いただいた方は、ご登録の電話番号と、カタログに記載されているパスワードでログインしてください。
                        </p>
                        <form action="#" method="POST" class="login-form" onsubmit="event.preventDefault(); window.location.href='/app/apply_demo/htdocs/order/index.html';">
                            <div class="form-group">
                                <label for="member-tel">電話番号</label>
                                <input type="tel" id="member-tel" name="tel" placeholder="09012345678" required>
                            </div>
                            <div class="form-group">
                                <label for="member-password">パスワード</label>
                                <input type="password" id="member-password" name="password" placeholder="" required>
                            </div>
                            <div class="action-area">
                                <button type="submit" class="btn btn-primary">ログイン</button>
                            </div>
                            <div class="form-footer">
                                <a href="#" class="link-text">パスワードをお忘れの方はこちら</a>
                            </div>
                        </form>
                    </div>
